services:
  mysql:
    image: mysql:8.0
    container_name: tarifario_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${LOCAL_DB_NAME:-tarifario_inbioslab}
      MYSQL_USER: ${LOCAL_DB_USER:-inbioslab}
      MYSQL_PASSWORD: ${LOCAL_DB_PASSWORD:-change_me_local_password}
      MYSQL_ROOT_PASSWORD: ${LOCAL_DB_ROOT_PASSWORD:-change_me_local_root_password}
    ports:
      - "${LOCAL_DB_PORT:-3306}:3306"
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    volumes:
      - tarifario_mysql_data:/var/lib/mysql

  phpmyadmin:
    image: phpmyadmin:5
    container_name: tarifario_phpmyadmin
    restart: unless-stopped
    ports:
      - "${PMA_HTTP_PORT:-8080}:80"
    environment:
      PMA_HOST: ${PMA_HOST:-mysql}
      PMA_PORT: ${PMA_PORT:-3306}
      PMA_ARBITRARY: 1
    depends_on:
      - mysql

volumes:
  tarifario_mysql_data:
